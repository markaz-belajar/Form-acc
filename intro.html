<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Markaz Belajar — Class of 2026</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;touch-action:none;background:#6ec6f5;}
  #scene{position:fixed;inset:0;overflow:hidden;}

  /* ====== CLOUD SLIDESHOW ====== */
  .cloud-frame{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;object-position:center top;
    opacity:0;transition:opacity 1.5s ease-in-out;z-index:1;
  }
  .cloud-frame.active{opacity:1;}

  /* ====== LOGO ====== */
  #logo{
    position:absolute;top:48px;left:50%;
    transform:translateX(-50%);width:136px;z-index:10;opacity:0;
    filter:drop-shadow(0 4px 16px rgba(0,0,0,0.20));
    animation:logoIn 0.7s cubic-bezier(0.34,1.4,0.64,1) 0.5s forwards;
  }
  @keyframes logoIn{
    0%  {opacity:0;transform:translateX(-50%) translateY(-24px) scale(0.75);}
    100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}
  }

  /* ====== CLASS OF 2026 ====== */
  #class-text{
    position:absolute;top:118px;left:50%;
    transform:translateX(-50%);width:80%;max-width:310px;
    z-index:9;opacity:0;
    filter:drop-shadow(0 6px 20px rgba(0,0,0,0.22));
    animation:textIn 1.0s cubic-bezier(0.22,1.4,0.36,1) 1.1s forwards,
              textFloat 4.2s ease-in-out 2.4s infinite;
  }
  @keyframes textIn{
    0%  {opacity:0;transform:translateX(-50%) scale(0.5) rotate(-5deg);}
    65% {opacity:1;transform:translateX(-50%) scale(1.07) rotate(1deg);}
    100%{opacity:1;transform:translateX(-50%) scale(1) rotate(0deg);}
  }
  @keyframes textFloat{
    0%,100%{transform:translateX(-50%) translateY(0px);}
    50%    {transform:translateX(-50%) translateY(-11px);}
  }
  /* Saat drag — non-active animasi float */
  #class-text.dragging{animation:textIn 0s, none !important;}

  /* ====== MASKOT SOMA ====== */
  #mascot{
    position:absolute;bottom:8%;left:50%;
    transform:translateX(-50%) translateY(115%);
    width:70%;max-width:295px;
    z-index:8;opacity:0;
    filter:drop-shadow(0 14px 30px rgba(0,0,0,0.15));
  }
  #mascot.rise{
    transition:transform 2.6s cubic-bezier(0.20,0.85,0.36,1), opacity 1.2s ease;
    opacity:1;transform:translateX(-50%) translateY(0);
  }
  #mascot.float{animation:mascotFloat 3.8s ease-in-out infinite;}
  @keyframes mascotFloat{
    0%,100%{transform:translateX(-50%) translateY(0px) rotate(0deg);}
    45%    {transform:translateX(-50%) translateY(-15px) rotate(-0.8deg);}
  }

  /* ====== BOTTOM GRADIENT PULL ====== */
  /* Gradasi gelap di bawah, ikut naik saat drag */
  #pull-gradient{
    position:absolute;
    bottom:0;left:0;right:0;
    height:260px;
    background:linear-gradient(to top,
      rgba(10,30,80,0.72) 0%,
      rgba(10,30,80,0.38) 45%,
      transparent 100%);
    z-index:18;
    transform:translateY(0);
    transition:transform 0.08s linear;
    pointer-events:none;
  }

  /* ====== SWIPE CTA ====== */
  #swipe-cta{
    position:absolute;bottom:38px;left:50%;
    transform:translateX(-50%);
    z-index:20;opacity:0;
    display:flex;flex-direction:column;align-items:center;gap:5px;
    animation:ctaIn 0.9s ease 2.6s forwards;
    cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
    /* akan digerakkan via JS translateY */
    will-change:transform;
  }
  @keyframes ctaIn{
    0%  {opacity:0;transform:translateX(-50%) translateY(20px);}
    100%{opacity:1;transform:translateX(-50%) translateY(0);}
  }

  /* Bouncing arrows */
  .arrows{
    display:flex;flex-direction:column;align-items:center;gap:1px;
    animation:arrowBounce 1.6s ease-in-out 3.0s infinite;
  }
  @keyframes arrowBounce{
    0%,100%{transform:translateY(0);}
    50%    {transform:translateY(-9px);}
  }
  /* saat drag — matikan bounce */
  #swipe-cta.dragging .arrows{animation:none;}

  .arr{display:block;width:38px;height:19px;}
  .arr svg polyline{stroke:white;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .arr:nth-child(1){opacity:0.28;}
  .arr:nth-child(2){opacity:0.60;}
  .arr:nth-child(3){opacity:1.00;}
  .arr:nth-child(3) svg polyline{
    filter:drop-shadow(0 0 7px rgba(255,255,255,1)) drop-shadow(0 0 14px rgba(130,230,255,0.9));
  }

  /* Swipe label — font tebal bergaya seperti semula */
  .swipe-label{
    font-size:15px;font-weight:800;letter-spacing:2.5px;
    text-transform:uppercase;color:#fff;margin-top:3px;
    font-family:'Segoe UI',system-ui,sans-serif;
    text-shadow:
      0 0 12px rgba(255,255,255,0.9),
      0 0 28px rgba(100,210,255,0.7),
      0 2px 6px rgba(0,0,0,0.25);
    animation:labelPulse 2.2s ease-in-out 3.0s infinite;
  }
  @keyframes labelPulse{
    0%,100%{opacity:0.85;}
    50%    {opacity:1;text-shadow:0 0 20px rgba(255,255,255,1),0 0 48px rgba(100,210,255,1),0 2px 6px rgba(0,0,0,0.25);}
  }
  #swipe-cta.dragging .swipe-label{animation:none;opacity:1;}

  /* ====== SPARKLES ====== */
  .sp{position:absolute;pointer-events:none;z-index:15;opacity:0;animation:spk 2.8s ease-in-out infinite;}
  @keyframes spk{
    0%,100%{opacity:0;transform:scale(0.4) rotate(0deg);}
    50%    {opacity:0.8;transform:scale(1) rotate(180deg);}
  }

  /* ====== EXIT ====== */
  #scene.exit{animation:exitAnim 0.45s cubic-bezier(0.4,0,0.6,1) forwards;}
  @keyframes exitAnim{
    0%  {opacity:1;transform:scale(1);}
    100%{opacity:0;transform:scale(1.06);}
  }
</style>
</head>
<body>
<div id="scene">

  <!-- 4 frame cloud BG -->
  <img class="cloud-frame active" src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/beg_1.1.png" alt="">
  <img class="cloud-frame"        src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/beg_1.2.png" alt="">
  <img class="cloud-frame"        src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/beg_1.3.png" alt="">
  <img class="cloud-frame"        src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/beg_1.4.png" alt="">

  <!-- Sparkles -->
  <div class="sp" style="top:17%;left:7%;animation-delay:0.4s;"><svg width="17" height="17" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12l6.5-1.5z" fill="white"/></svg></div>
  <div class="sp" style="top:11%;right:13%;animation-delay:1.3s;"><svg width="11" height="11" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12l6.5-1.5z" fill="white"/></svg></div>
  <div class="sp" style="top:32%;left:14%;animation-delay:2.0s;"><svg width="9" height="9" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12l6.5-1.5z" fill="white" opacity="0.7"/></svg></div>
  <div class="sp" style="top:22%;right:25%;animation-delay:0.9s;"><svg width="13" height="13" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12l6.5-1.5z" fill="rgba(255,240,140,0.95)"/></svg></div>

  <!-- Logo -->
  <img id="logo" src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/MARKAZ_BELAJAR_LOGO.png" alt="Markaz Belajar">

  <!-- Class of 2026 -->
  <img id="class-text" src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/bag_2.png" alt="Class of 2026">

  <!-- Maskot -->
  <img id="mascot" src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/bag_3.png" alt="Maskot Soma">

  <!-- Bottom gradient yang ikut naik -->
  <div id="pull-gradient"></div>

  <!-- Swipe CTA -->
  <div id="swipe-cta" id="swipe-cta">
    <div class="arrows">
      <div class="arr"><svg viewBox="0 0 38 19"><polyline points="4,15 19,4 34,15"/></svg></div>
      <div class="arr"><svg viewBox="0 0 38 19"><polyline points="4,15 19,4 34,15"/></svg></div>
      <div class="arr"><svg viewBox="0 0 38 19"><polyline points="4,15 19,4 34,15"/></svg></div>
    </div>
    <div class="swipe-label">Swipe up !</div>
  </div>

</div>
<script>
  // ===== CLOUD SLIDESHOW =====
  const frames = document.querySelectorAll('.cloud-frame');
  let cur = 0;
  setInterval(() => {
    frames[cur].classList.remove('active');
    cur = (cur + 1) % frames.length;
    frames[cur].classList.add('active');
  }, 8000);

  // ===== MASKOT RISE =====
  const mascot = document.getElementById('mascot');
  setTimeout(() => {
    mascot.classList.add('rise');
    setTimeout(() => {
      mascot.style.transition = 'none';
      mascot.style.transform  = 'translateX(-50%) translateY(0)';
      void mascot.offsetHeight;
      mascot.classList.remove('rise');
      mascot.classList.add('float');
    }, 2700);
  }, 800);

  // ===== SWIPE INTERACTION =====
  const cta       = document.getElementById('swipe-cta');
  const gradient  = document.getElementById('pull-gradient');
  const classText = document.getElementById('class-text');

  let ty0 = 0, isDragging = false, dragY = 0;
  const MAX_PULL = 220; // px max sebelum trigger
  const TRIGGER  = 110; // px untuk pindah halaman

  function onStart(y) {
    ty0 = y;
    isDragging = true;
    cta.classList.add('dragging');
    classText.classList.add('dragging');
    cta.style.transition = 'none';
    gradient.style.transition = 'none';
    classText.style.transition = 'transform 0.08s linear';
  }

  function onMove(y) {
    if (!isDragging) return;
    dragY = Math.max(0, Math.min(ty0 - y, MAX_PULL)); // hanya naik

    // CTA naik mengikuti jari
    cta.style.transform = `translateX(-50%) translateY(${-dragY}px)`;

    // Gradient naik + makin terang sesuai drag
    const gradProgress = dragY / MAX_PULL;
    gradient.style.transform  = `translateY(${-dragY * 0.6}px)`;
    gradient.style.opacity    = 0.6 + gradProgress * 0.4;

    // Class text naik sedikit (parallax lebih lambat)
    classText.style.transform = `translateX(-50%) translateY(${-dragY * 0.18}px)`;

    // Jika cukup jauh → trigger
    if (dragY >= TRIGGER) goToForm();
  }

  function onEnd(y) {
    if (!isDragging) return;
    isDragging = false;
    const finalDragY = Math.max(0, Math.min(ty0 - y, MAX_PULL));

    if (finalDragY >= TRIGGER) { goToForm(); return; }

    // Snap kembali
    cta.style.transition      = 'transform 0.4s cubic-bezier(0.34,1.3,0.64,1)';
    gradient.style.transition  = 'transform 0.4s ease, opacity 0.4s ease';
    classText.style.transition = 'transform 0.4s cubic-bezier(0.34,1.1,0.64,1)';

    cta.style.transform       = 'translateX(-50%) translateY(0)';
    gradient.style.transform  = 'translateY(0)';
    gradient.style.opacity    = '1';
    classText.style.transform = 'translateX(-50%) translateY(0)';

    setTimeout(() => {
      cta.classList.remove('dragging');
      classText.classList.remove('dragging');
      cta.style.transition       = '';
      gradient.style.transition  = '';
      classText.style.transition = '';
    }, 420);
  }

  // Touch
  document.addEventListener('touchstart', e => onStart(e.touches[0].clientY), {passive:true});
  document.addEventListener('touchmove',  e => onMove(e.touches[0].clientY),  {passive:true});
  document.addEventListener('touchend',   e => onEnd(e.changedTouches[0].clientY), {passive:true});

  // Mouse (untuk testing di desktop)
  document.addEventListener('mousedown',  e => onStart(e.clientY));
  document.addEventListener('mousemove',  e => { if(isDragging) onMove(e.clientY); });
  document.addEventListener('mouseup',    e => onEnd(e.clientY));

  // Click CTA langsung
  cta.addEventListener('click', () => { if(dragY < 10) goToForm(); });

  function goToForm() {
    isDragging = false;
    document.getElementById('scene').classList.add('exit');
    setTimeout(() => { window.location.href = 'index.html'; }, 460);
  }
</script>
</body>
</html>
