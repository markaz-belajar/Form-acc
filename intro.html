<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Markaz Belajar — Class of 2026</title>
<meta name="theme-color" content="#6ec6f5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{background:#5ab8ec;height:100%;}
body{
  width:100%;height:100%;overflow:hidden;
  touch-action:none;background:#5ab8ec;
  -webkit-user-select:none;-moz-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}
img{
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  pointer-events:none;
  -webkit-user-drag:none;
  user-drag:none;
  draggable:false;
}
#loading-screen{
  position:fixed;inset:0;z-index:999;
  background:linear-gradient(175deg,#7dd6f8 0%,#4aaee0 100%);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:32px;
  opacity:1;
  transition:opacity 0.85s cubic-bezier(0.4,0,0.2,1);
  pointer-events:all;
}
#loading-screen.hide{opacity:0;pointer-events:none;}
#loading-logo{
  width:140px;
  filter:drop-shadow(0 8px 32px rgba(0,0,80,0.18));
  animation:lvt 2.2s ease-in-out infinite;
  opacity:0;
  transition:opacity 0.4s ease;
}
#loading-logo.loaded{opacity:1;}
@keyframes lvt{
  0%,100%{transform:translateY(0px);}
  50%{transform:translateY(-22px);}
}
#loading-dots{display:flex;gap:10px;}
.dot{
  width:9px;height:9px;border-radius:50%;
  background:rgba(255,255,255,0.5);
  animation:dotPulse 1.4s ease-in-out infinite;
}
.dot:nth-child(1){animation-delay:0s;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes dotPulse{
  0%,60%,100%{transform:scale(1);background:rgba(255,255,255,0.4);}
  30%{transform:scale(1.5);background:rgba(255,255,255,0.95);}
}
#loading-label{
  font-family:'Nunito',system-ui,sans-serif;
  font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.7);
  margin-top:-18px;
}
#scene{
  position:fixed;inset:0;overflow:hidden;
  opacity:0;
}
#scene.show{opacity:1;transition:opacity 1.0s ease;}
#scene.exit{animation:sceneExit 0.45s cubic-bezier(0.4,0,0.6,1) forwards;}
@keyframes sceneExit{to{opacity:0;transform:scale(1.06);}}
#bg-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;}
#logo{
  position:absolute;top:48px;left:50%;
  width:136px;z-index:10;
  opacity:0;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,.2));
  animation:logoIn .7s cubic-bezier(.34,1.4,.64,1) .2s both;
}
@keyframes logoIn{
  from{opacity:0;transform:translateX(-50%) translateY(-24px) scale(.75);}
  to{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}
}
#class-text{
  position:absolute;top:110px;left:50%;
  width:86%;max-width:360px;z-index:9;
  opacity:0;
  filter:drop-shadow(0 6px 20px rgba(0,0,0,.22));
}
#mascot-wrap{
  position:absolute;
  bottom:-2%;left:50%;
  width:75%;max-width:310px;
  z-index:8;
  transform:translateX(-35%) translateY(120%);
  -webkit-touch-callout:none;
  -webkit-user-select:none;user-select:none;
}
#mascot-wrap img{width:100%;display:block;
  filter:drop-shadow(0 14px 30px rgba(0,0,0,.15));}
#swipe-cta{
  position:absolute;bottom:38px;left:50%;
  transform:translateX(-50%) translateY(0);
  z-index:20;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  opacity:0;
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.arrows{display:flex;flex-direction:column;align-items:center;gap:1px;}
.arr{display:block;width:32px;height:16px;}
.arr svg polyline{stroke:#fff;stroke-width:2.4;fill:none;
  stroke-linecap:round;stroke-linejoin:round;}
.arr:nth-child(1){opacity:.25;}
.arr:nth-child(2){opacity:.55;}
.arr:nth-child(3){opacity:.9;}
.swipe-label{
  font-family:'Nunito',system-ui,sans-serif;
  font-size:11px;font-weight:700;letter-spacing:1.8px;
  text-transform:uppercase;
  color:rgba(255,255,255,.82);
  text-shadow:0 0 10px rgba(255,255,255,.6),0 1px 4px rgba(0,0,0,.18);
  margin-top:2px;
}
.sp{
  position:absolute;pointer-events:none;z-index:15;
  opacity:0;animation:spk 2.8s ease-in-out infinite;
}
@keyframes spk{
  0%,100%{opacity:0;transform:scale(.4) rotate(0);}
  50%{opacity:.8;transform:scale(1) rotate(180deg);}
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<div id="loading-screen">
  <img id="loading-logo"
    src="https://cdn.jsdelivr.net/gh/markaz-belajar/Form-acc@main/MARKAZ_BELAJAR_LOGO.png"
    alt="Markaz Belajar" crossorigin="anonymous" draggable="false" oncontextmenu="return false"
    onload="this.classList.add('loaded')">
  <div id="loading-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div id="loading-label">Memuat…</div>
</div>

<div id="scene">
  <canvas id="bg-canvas"></canvas>
  <div class="sp" style="top:17%;left:7%;animation-delay:.4s"><svg width="17" height="17" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12z" fill="#fff"/></svg></div>
  <div class="sp" style="top:11%;right:13%;animation-delay:1.3s"><svg width="11" height="11" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12z" fill="#fff"/></svg></div>
  <div class="sp" style="top:32%;left:14%;animation-delay:2s"><svg width="9" height="9" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12z" fill="#fff" opacity=".7"/></svg></div>
  <div class="sp" style="top:22%;right:25%;animation-delay:.9s"><svg width="13" height="13" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12z" fill="rgba(255,240,140,.95)"/></svg></div>

  <img id="logo" data-src="https://cdn.jsdelivr.net/gh/markaz-belajar/Form-acc@main/MARKAZ_BELAJAR_LOGO.png"
    alt="Markaz Belajar" draggable="false" oncontextmenu="return false">
  <img id="class-text" data-src="https://cdn.jsdelivr.net/gh/markaz-belajar/Form-acc@main/bag_2.png"
    alt="Class of 2026" draggable="false" oncontextmenu="return false">
  <div id="mascot-wrap">
    <img id="mascot-img" data-src="https://cdn.jsdelivr.net/gh/markaz-belajar/Form-acc@main/bag_3.png"
      alt="Maskot" draggable="false" oncontextmenu="return false">
  </div>

  <div id="swipe-cta">
    <div class="arrows">
      <div class="arr"><svg viewBox="0 0 32 16"><polyline points="3,13 16,3 29,13"/></svg></div>
      <div class="arr"><svg viewBox="0 0 32 16"><polyline points="3,13 16,3 29,13"/></svg></div>
      <div class="arr"><svg viewBox="0 0 32 16"><polyline points="3,13 16,3 29,13"/></svg></div>
    </div>
    <div class="swipe-label">Swipe Up</div>
  </div>
</div>

<script>
'use strict';

// ── URL ASET ────────────────────────────────────────────────
const BG_URLS = [
  'https://cdn.jsdelivr.net/gh/markaz-belajar/Form-acc@main/beg_1.1.png',
  'https://cdn.jsdelivr.net/gh/markaz-belajar/Form-acc@main/beg_1.2.png',
  'https://cdn.jsdelivr.net/gh/markaz-belajar/Form-acc@main/beg_1.3.png',
  'https://cdn.jsdelivr.net/gh/markaz-belajar/Form-acc@main/beg_1.4.png',
];
const SCENE_URLS = [
  'https://cdn.jsdelivr.net/gh/markaz-belajar/Form-acc@main/MARKAZ_BELAJAR_LOGO.png',
  'https://cdn.jsdelivr.net/gh/markaz-belajar/Form-acc@main/bag_2.png',
  'https://cdn.jsdelivr.net/gh/markaz-belajar/Form-acc@main/bag_3.png',
];
const ALL_URLS = [...BG_URLS, ...SCENE_URLS];

// ── ELEMEN ───────────────────────────────────────────────────
const loadingScreen = document.getElementById('loading-screen');
const scene         = document.getElementById('scene');
const bgCanvas      = document.getElementById('bg-canvas');
const bgCtx         = bgCanvas.getContext('2d');
const mascotWrap    = document.getElementById('mascot-wrap');
const mascotImg     = document.getElementById('mascot-img');
const classText     = document.getElementById('class-text');
const logoEl        = document.getElementById('logo');
const cta           = document.getElementById('swipe-cta');

// ── PRELOAD GAMBAR SAJA (tidak ada audio di sini) ────────────
const imageCache = {};
function preloadAll(onDone) {
  let remaining = ALL_URLS.length;
  if (remaining === 0) { onDone(); return; }
  function tick() { if (--remaining === 0) onDone(); }
  ALL_URLS.forEach(url => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => { imageCache[url] = img; tick(); };
    img.onerror = () => { imageCache[url] = img; tick(); };
    img.src = url;
  });
}

// ── BACKGROUND CANVAS (seamless scroll) ─────────────────────
const BG_SPEED = 0.55;
let bgStrip = null, stripW = 0, bgOffset = 0;

function buildStrip() {
  const H    = bgCanvas.height;
  const imgs = BG_URLS.map(u => imageCache[u]).filter(img => img && img.naturalWidth);
  if (!imgs.length) return;
  const widths = imgs.map(img => Math.round((img.naturalWidth / img.naturalHeight) * H));
  stripW = widths.reduce((a, b) => a + b, 0);
  const oc = document.createElement('canvas');
  oc.width = stripW; oc.height = H;
  const c2 = oc.getContext('2d');
  let x = 0;
  imgs.forEach((img, i) => { c2.drawImage(img, x, 0, widths[i], H); x += widths[i]; });
  bgStrip = oc; bgOffset = 0;
}

function resizeBg() {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  buildStrip();
}
window.addEventListener('resize', resizeBg);

function drawBg() {
  const W = bgCanvas.width, H = bgCanvas.height;
  if (!bgStrip || stripW === 0) { bgCtx.fillStyle = '#5ab8ec'; bgCtx.fillRect(0, 0, W, H); return; }
  bgOffset = ((bgOffset % stripW) + stripW) % stripW;
  bgCtx.drawImage(bgStrip, -bgOffset,          0, stripW, H);
  bgCtx.drawImage(bgStrip, -bgOffset + stripW,  0, stripW, H);
  bgOffset += BG_SPEED;
}

// ── FLOAT ANIMATION ──────────────────────────────────────────
const MASCOT_BASE_X = '-35%';
const FLOAT_AMP = 14, FLOAT_SPEED = 0.018;
let floatPhase = 0, cfPhase = Math.PI;
let mascotReady = false, cfReady = false;
let isDragging = false, dragStartY = 0, dragDeltaY = 0;
let triggered = false;

function mainLoop() {
  drawBg();
  floatPhase += FLOAT_SPEED;
  cfPhase    += FLOAT_SPEED * 0.85;
  if (!isDragging && !triggered && mascotReady) {
    const fy = Math.sin(floatPhase) * FLOAT_AMP;
    mascotWrap.style.transform = `translateX(${MASCOT_BASE_X}) translateY(${fy}px)`;
  }
  if (!isDragging && !triggered && cfReady) {
    const cy = Math.sin(cfPhase) * 10;
    classText.style.transform = `translateX(-50%) translateY(${cy}px)`;
  }
  requestAnimationFrame(mainLoop);
}

function animateClassText() {
  const dur = 900, t0 = performance.now();
  classText.style.transition = 'none';
  classText.style.opacity    = '0';
  classText.style.transform  = 'translateX(-50%) scale(0.5) rotate(-5deg)';
  (function step(now) {
    if (triggered) return;
    const t = Math.min((now - t0) / dur, 1);
    let scale, rot, op;
    if (t < 0.65) {
      const p = t / 0.65;
      scale = 0.5 + p * 0.6; rot = -5 + p * 6; op = p;
    } else {
      const p = (t - 0.65) / 0.35;
      scale = 1.1 - p * 0.1; rot = 1 - p; op = 1;
    }
    classText.style.opacity   = String(op);
    classText.style.transform = `translateX(-50%) scale(${scale}) rotate(${rot}deg)`;
    if (t < 1) requestAnimationFrame(step);
  })(performance.now());
}

// ── GESTURE RECORDER (untuk unlock autoplay di index.html) ───
// Intro TIDAK memutar musik sama sekali.
// Saat user pertama kali menyentuh layar, kita catat di sessionStorage.
// index.html akan membaca flag ini dan langsung play() dari awal — mulus tanpa patah.
let gestureRecorded = false;
function recordGesture() {
  if (gestureRecorded) return;
  gestureRecorded = true;
  sessionStorage.setItem('mb_music_ready', '1');
}
document.addEventListener('touchstart', recordGesture, {passive: true});
document.addEventListener('mousedown',  recordGesture);

// ── REVEAL SCENE ─────────────────────────────────────────────
function reveal() {
  logoEl.src    = imageCache[SCENE_URLS[0]]?.src || SCENE_URLS[0];
  classText.src = imageCache[SCENE_URLS[1]]?.src || SCENE_URLS[1];
  mascotImg.src = imageCache[SCENE_URLS[2]]?.src || SCENE_URLS[2];

  resizeBg();
  requestAnimationFrame(mainLoop);

  loadingScreen.classList.add('hide');
  setTimeout(() => { loadingScreen.style.display = 'none'; }, 950);
  scene.classList.add('show');

  setTimeout(() => { animateClassText(); }, 600);

  setTimeout(() => {
    mascotWrap.style.transition = 'transform 2.2s cubic-bezier(0.20,0.85,0.36,1)';
    mascotWrap.style.transform  = `translateX(${MASCOT_BASE_X}) translateY(0px)`;
    setTimeout(() => {
      mascotWrap.style.transition = '';
      mascotReady = true;
      cta.style.transition = 'opacity 0.7s ease';
      cta.style.opacity    = '0.65';
    }, 2300);
  }, 500);

  setTimeout(() => { cfReady = true; }, 1600);
}

// ── ANDROID BACK BUTTON (bfcache) ────────────────────────────
window.addEventListener('pageshow', e => {
  if (e.persisted) {
    triggered = false; isDragging = false; dragDeltaY = 0;
    mascotReady = false; cfReady = false;
    floatPhase = 0; cfPhase = Math.PI; bgOffset = 0;
    scene.classList.remove('exit');
    scene.style.animation = '';
    scene.classList.add('show');
    mascotWrap.style.transition = 'none';
    mascotWrap.style.transform  = `translateX(${MASCOT_BASE_X}) translateY(120%)`;
    void mascotWrap.offsetWidth;
    setTimeout(() => {
      mascotWrap.style.transition = 'transform 2.2s cubic-bezier(0.20,0.85,0.36,1)';
      mascotWrap.style.transform  = `translateX(${MASCOT_BASE_X}) translateY(0px)`;
      setTimeout(() => {
        mascotWrap.style.transition = '';
        mascotReady = true;
        cta.style.transition = 'opacity 0.7s ease';
        cta.style.opacity    = '0.65';
      }, 2300);
    }, 300);
    setTimeout(() => { cfReady = true; }, 1400);
  }
});

// ── DRAG / SWIPE ─────────────────────────────────────────────
const MAX_DRAG = 320, TRIGGER = 130;

function onStart(y) {
  if (!mascotReady || triggered) return;
  isDragging = true; dragStartY = y; dragDeltaY = 0;
}
function onMove(y) {
  if (!isDragging || triggered) return;
  dragDeltaY = Math.max(0, Math.min(dragStartY - y, MAX_DRAG));
  const fy = Math.sin(floatPhase) * FLOAT_AMP;
  mascotWrap.style.transform = `translateX(${MASCOT_BASE_X}) translateY(${fy - dragDeltaY}px)`;
  const p1 = Math.min(dragDeltaY / (TRIGGER * 0.7), 1);
  cta.style.transform = `translateX(-50%) translateY(${-dragDeltaY * 0.8}px)`;
  cta.style.opacity   = String(0.65 * (1 - p1));
  const p2 = Math.min(dragDeltaY / (TRIGGER * 0.85), 1);
  classText.style.opacity   = String(1 - p2);
  classText.style.transform = `translateX(-50%) scale(${1 - p2 * 0.08})`;
  if (dragDeltaY >= TRIGGER) goToForm();
}
function onEnd() {
  if (!isDragging) return;
  isDragging = false;
  if (triggered || dragDeltaY >= TRIGGER) { goToForm(); return; }
  cta.style.transition = 'transform .45s cubic-bezier(.34,1.3,.64,1), opacity .45s ease';
  cta.style.transform  = 'translateX(-50%) translateY(0)';
  cta.style.opacity    = '0.65';
  const sf = dragDeltaY, sd = 450, st = performance.now();
  (function snap(now) {
    const t  = Math.min((now - st) / sd, 1);
    const e  = 1 - Math.pow(1 - t, 3);
    const fy = Math.sin(floatPhase) * FLOAT_AMP;
    mascotWrap.style.transform = `translateX(${MASCOT_BASE_X}) translateY(${fy - sf * (1 - e)}px)`;
    if (t < 1) requestAnimationFrame(snap);
  })(performance.now());
  const fo = parseFloat(classText.style.opacity) || 0, fd = 400, ft = performance.now();
  (function fadeBack(now) {
    const t  = Math.min((now - ft) / fd, 1);
    const op = fo + (1 - fo) * (1 - Math.pow(1 - t, 2));
    classText.style.opacity   = String(op);
    classText.style.transform = `translateX(-50%) scale(${1 - (1 - op) * 0.08})`;
    if (t < 1) requestAnimationFrame(fadeBack);
  })(performance.now());
  dragDeltaY = 0;
}

document.addEventListener('touchstart',  e => onStart(e.touches[0].clientY), {passive:true});
document.addEventListener('touchmove',   e => onMove(e.touches[0].clientY),   {passive:true});
document.addEventListener('touchend',    () => onEnd(), {passive:true});
document.addEventListener('touchcancel', () => onEnd(), {passive:true});
document.addEventListener('mousedown',   e => onStart(e.clientY));
document.addEventListener('mousemove',   e => { if (isDragging) onMove(e.clientY); });
document.addEventListener('mouseup',     () => onEnd());
cta.addEventListener('click', () => { if (!triggered && dragDeltaY < 10) goToForm(); });

// ── NAVIGASI KE FORM ─────────────────────────────────────────
function goToForm() {
  if (triggered) return;
  triggered = true; isDragging = false;
  const fy = Math.sin(floatPhase) * FLOAT_AMP;
  mascotWrap.style.transition = 'transform 0.6s cubic-bezier(0.4,0,0.2,1)';
  mascotWrap.style.transform  = `translateX(${MASCOT_BASE_X}) translateY(${fy - 500}px)`;
  cta.style.transition = 'transform .4s ease, opacity .35s ease';
  cta.style.transform  = 'translateX(-50%) translateY(-120px)';
  cta.style.opacity    = '0';
  classText.style.transition = 'opacity .4s ease';
  classText.style.opacity    = '0';

  // Tandai: user sudah gesture di intro → index.html boleh autoplay musik
  sessionStorage.setItem('mb_music_playing', '1');

  setTimeout(() => {
    scene.classList.add('exit');
    setTimeout(() => { window.location.href = 'index.html'; }, 460);
  }, 420);
}

// ── BLOKIR CONTEXT MENU & DRAG ───────────────────────────────
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart',  e => e.preventDefault());
document.addEventListener('dragstart',    e => e.preventDefault());

// ── KICK OFF ─────────────────────────────────────────────────
preloadAll(reveal);
</script>
</body>
</html>
