<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Markaz Belajar — Class of 2026</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;overflow:hidden;
  touch-action:none;background:#5ab8ec;
  /* Blokir seleksi teks di seluruh halaman */
  -webkit-user-select:none;-moz-user-select:none;user-select:none;
  /* Blokir callout (long-press bubble) di iOS/Android */
  -webkit-touch-callout:none;
}
/* Blokir drag & context menu pada semua gambar */
img{
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  pointer-events:none;      /* gambar tidak bisa di-tap/long-press langsung */
  -webkit-user-drag:none;
  user-drag:none;
  draggable:false;
}

/* ══════════════════════════════════════════════
   LOADING SCREEN
   Tampil instan, hanya warna + logo + dots
   Tidak bergantung pada aset apapun selain logo
══════════════════════════════════════════════ */
#loading-screen{
  position:fixed;inset:0;z-index:999;
  background:linear-gradient(175deg,#7dd6f8 0%,#4aaee0 100%);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:32px;
  /* Awalnya penuh, transisi keluar saat hide */
  opacity:1;
  transition:opacity 0.85s cubic-bezier(0.4,0,0.2,1);
  pointer-events:all;
}
#loading-screen.hide{
  opacity:0;
  pointer-events:none;
}

/* Logo levitasi di loading screen */
#loading-logo{
  width:140px;
  /* Gambar logo sudah ada di cache browser setelah load pertama,
     tapi kalau belum → kita tampilkan placeholder SVG inline dulu */
  filter:drop-shadow(0 8px 32px rgba(0,0,80,0.18));
  animation:lvt 2.2s ease-in-out infinite;
  /* Sembunyikan sampai benar-benar loaded */
  opacity:0;
  transition:opacity 0.4s ease;
}
#loading-logo.loaded{opacity:1;}
@keyframes lvt{
  0%,100%{transform:translateY(0px);}
  50%    {transform:translateY(-22px);}
}

/* Dots progress */
#loading-dots{
  display:flex;gap:10px;
}
.dot{
  width:9px;height:9px;border-radius:50%;
  background:rgba(255,255,255,0.5);
  animation:dotPulse 1.4s ease-in-out infinite;
}
.dot:nth-child(1){animation-delay:0s;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes dotPulse{
  0%,60%,100%{transform:scale(1);background:rgba(255,255,255,0.4);}
  30%        {transform:scale(1.5);background:rgba(255,255,255,0.95);}
}

/* Teks loading kecil */
#loading-label{
  font-family:'Nunito',system-ui,sans-serif;
  font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.7);
  margin-top:-18px;
}


/* ══════════════════════════════════════════════
   SCENE — tersembunyi sampai semua aset ready
══════════════════════════════════════════════ */
#scene{
  position:fixed;inset:0;overflow:hidden;
  opacity:0;
  /* Tidak ada transition awal, diaktifkan JS saat reveal */
}
#scene.show{
  opacity:1;
  transition:opacity 1.0s ease;
}
#scene.exit{
  animation:sceneExit 0.45s cubic-bezier(0.4,0,0.6,1) forwards;
}
@keyframes sceneExit{to{opacity:0;transform:scale(1.06);}}


/* ══════════════════════════════════════════════
   BG CANVAS
══════════════════════════════════════════════ */
#bg-canvas{
  position:absolute;top:0;left:0;
  width:100%;height:100%;z-index:1;
}


/* ══════════════════════════════════════════════
   LOGO (scene)
══════════════════════════════════════════════ */
#logo{
  position:absolute;top:48px;left:50%;
  width:136px;z-index:10;
  opacity:0;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,.2));
  /* Animasi dimulai setelah scene.show aktif */
  animation:logoIn .7s cubic-bezier(.34,1.4,.64,1) .2s both;
}
@keyframes logoIn{
  from{opacity:0;transform:translateX(-50%) translateY(-24px) scale(.75);}
  to  {opacity:1;transform:translateX(-50%) translateY(0)    scale(1);}
}


/* ══════════════════════════════════════════════
   CLASS TEXT
══════════════════════════════════════════════ */
#class-text{
  position:absolute;top:110px;left:50%;
  width:86%;max-width:360px;z-index:9;
  opacity:0;
  filter:drop-shadow(0 6px 20px rgba(0,0,0,.22));
  animation:textIn 1s cubic-bezier(.22,1.4,.36,1) .6s both;
}
@keyframes textIn{
  0%  {opacity:0;transform:translateX(-50%) scale(.5) rotate(-5deg);}
  65% {opacity:1;transform:translateX(-50%) scale(1.07) rotate(1deg);}
  100%{opacity:1;transform:translateX(-50%) scale(1) rotate(0);}
}


/* ══════════════════════════════════════════════
   MASKOT
══════════════════════════════════════════════ */
#mascot-wrap{
  position:absolute;
  bottom:-2%;left:50%;
  width:75%;max-width:310px;
  z-index:8;
  transform:translateX(-35%) translateY(120%);
  -webkit-touch-callout:none;
  -webkit-user-select:none;user-select:none;
}
#mascot-wrap img{width:100%;display:block;
  filter:drop-shadow(0 14px 30px rgba(0,0,0,.15));}


/* ══════════════════════════════════════════════
   SWIPE CTA
══════════════════════════════════════════════ */
#swipe-cta{
  position:absolute;bottom:38px;left:50%;
  transform:translateX(-50%) translateY(0);
  z-index:20;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  opacity:0;          /* JS yang tampilkan */
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.arrows{display:flex;flex-direction:column;align-items:center;gap:1px;}
.arr{display:block;width:32px;height:16px;}
.arr svg polyline{stroke:#fff;stroke-width:2.4;fill:none;
  stroke-linecap:round;stroke-linejoin:round;}
.arr:nth-child(1){opacity:.25;}
.arr:nth-child(2){opacity:.55;}
.arr:nth-child(3){opacity:.9;}
.swipe-label{
  font-family:'Nunito',system-ui,sans-serif;
  font-size:11px;font-weight:700;letter-spacing:1.8px;
  text-transform:uppercase;
  color:rgba(255,255,255,.82);
  text-shadow:0 0 10px rgba(255,255,255,.6),0 1px 4px rgba(0,0,0,.18);
  margin-top:2px;
}


/* ══════════════════════════════════════════════
   SPARKLES
══════════════════════════════════════════════ */
.sp{
  position:absolute;pointer-events:none;z-index:15;
  opacity:0;animation:spk 2.8s ease-in-out infinite;
}
@keyframes spk{
  0%,100%{opacity:0;transform:scale(.4) rotate(0);}
  50%    {opacity:.8;transform:scale(1) rotate(180deg);}
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ════════════════════════════════════════════
     LOADING SCREEN
     Semua src langsung (tidak pakai data-src)
     supaya loading screen sendiri muncul cepat
════════════════════════════════════════════ -->
<div id="loading-screen">
  <img id="loading-logo"
    src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/MARKAZ_BELAJAR_LOGO.png"
    alt="Markaz Belajar" crossorigin="anonymous" draggable="false" oncontextmenu="return false"
    onload="this.classList.add('loaded')">
  <div id="loading-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div id="loading-label">Memuat…</div>
</div>

<!-- ════════════════════════════════════════════
     SCENE
     Semua <img> pakai data-src bukan src,
     sehingga browser TIDAK mulai download
     sampai JS secara eksplisit swap src-nya
     setelah semua preload selesai.
════════════════════════════════════════════ -->
<div id="scene">
  <canvas id="bg-canvas"></canvas>

  <!-- Sparkles (SVG inline, tidak perlu load) -->
  <div class="sp" style="top:17%;left:7%;animation-delay:.4s"><svg width="17" height="17" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12z" fill="#fff"/></svg></div>
  <div class="sp" style="top:11%;right:13%;animation-delay:1.3s"><svg width="11" height="11" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12z" fill="#fff"/></svg></div>
  <div class="sp" style="top:32%;left:14%;animation-delay:2s"><svg width="9" height="9" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12z" fill="#fff" opacity=".7"/></svg></div>
  <div class="sp" style="top:22%;right:25%;animation-delay:.9s"><svg width="13" height="13" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12z" fill="rgba(255,240,140,.95)"/></svg></div>

  <!-- Semua img pakai data-src supaya tidak load duluan -->
  <img id="logo"
    data-src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/MARKAZ_BELAJAR_LOGO.png"
    alt="Markaz Belajar" draggable="false" oncontextmenu="return false">

  <img id="class-text"
    data-src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/bag_2.png"
    alt="Class of 2026" draggable="false" oncontextmenu="return false">

  <div id="mascot-wrap">
    <img id="mascot-img"
      data-src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/bag_3.png"
      alt="Maskot" draggable="false" oncontextmenu="return false">
  </div>

  <div id="swipe-cta">
    <div class="arrows">
      <div class="arr"><svg viewBox="0 0 32 16"><polyline points="3,13 16,3 29,13"/></svg></div>
      <div class="arr"><svg viewBox="0 0 32 16"><polyline points="3,13 16,3 29,13"/></svg></div>
      <div class="arr"><svg viewBox="0 0 32 16"><polyline points="3,13 16,3 29,13"/></svg></div>
    </div>
    <div class="swipe-label">Swipe Up</div>
  </div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════
// CONFIG — tambahkan URL aset di sini sebanyak apapun
// ════════════════════════════════════════════════════════════
const BG_URLS = [
  'https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/beg_1.1.png',
  'https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/beg_1.2.png',
  'https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/beg_1.3.png',
  'https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/beg_1.4.png',
];
// Aset lain (scene) — tambah URL baru di sini
const SCENE_URLS = [
  'https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/MARKAZ_BELAJAR_LOGO.png',
  'https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/bag_2.png',
  'https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/bag_3.png',
];
const ALL_URLS = [...BG_URLS, ...SCENE_URLS];

// ════════════════════════════════════════════════════════════
// ELEMEN (deklarasi sebelum semua logic)
// ════════════════════════════════════════════════════════════
const loadingScreen = document.getElementById('loading-screen');
const scene         = document.getElementById('scene');
const bgCanvas      = document.getElementById('bg-canvas');
const bgCtx         = bgCanvas.getContext('2d');
const mascotWrap    = document.getElementById('mascot-wrap');
const mascotImg     = document.getElementById('mascot-img');
const classText     = document.getElementById('class-text');
const logoEl        = document.getElementById('logo');
const cta           = document.getElementById('swipe-cta');

// ════════════════════════════════════════════════════════════
// PRELOADER
// Semua aset di-download ke imageCache.
// Baru setelah 100% selesai → reveal() dipanggil.
// ════════════════════════════════════════════════════════════
const imageCache = {};

function preloadAll(onDone) {
  let remaining = ALL_URLS.length;
  if (remaining === 0) { onDone(); return; }

  ALL_URLS.forEach(url => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = img.onerror = () => {
      imageCache[url] = img;
      if (--remaining === 0) onDone();
    };
    img.src = url;   // download di background, tapi elemen scene belum pakai ini
  });
}


// ════════════════════════════════════════════════════════════
// BG — Seamless offscreen strip
// Semua frame di-stitch jadi satu strip, scroll dengan modulo
// ════════════════════════════════════════════════════════════
const BG_SPEED = 0.55;
let bgStrip  = null;
let stripW   = 0;
let bgOffset = 0;

function buildStrip() {
  const H    = bgCanvas.height;
  const imgs = BG_URLS.map(u => imageCache[u]).filter(img => img && img.naturalWidth);
  if (!imgs.length) return;

  const widths = imgs.map(img => Math.round((img.naturalWidth / img.naturalHeight) * H));
  stripW = widths.reduce((a, b) => a + b, 0);

  // Offscreen canvas: gambar semua frame berjejer tanpa gap
  const oc  = document.createElement('canvas');
  oc.width  = stripW;
  oc.height = H;
  const c2  = oc.getContext('2d');

  let x = 0;
  imgs.forEach((img, i) => {
    c2.drawImage(img, x, 0, widths[i], H);
    x += widths[i];
  });
  bgStrip = oc;
  bgOffset = 0;  // reset offset saat strip dibangun ulang
}

function resizeBg() {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  buildStrip();
}
window.addEventListener('resize', resizeBg);

function drawBg() {
  const W = bgCanvas.width, H = bgCanvas.height;
  if (!bgStrip || stripW === 0) {
    bgCtx.fillStyle = '#5ab8ec';
    bgCtx.fillRect(0, 0, W, H);
    return;
  }
  bgOffset = ((bgOffset % stripW) + stripW) % stripW;
  // Gambar dua kali agar seamless
  bgCtx.drawImage(bgStrip, -bgOffset,         0, stripW, H);
  bgCtx.drawImage(bgStrip, -bgOffset + stripW, 0, stripW, H);
  bgOffset += BG_SPEED;
}


// ════════════════════════════════════════════════════════════
// ANIMASI STATE
// ════════════════════════════════════════════════════════════
const MASCOT_BASE_X = '-35%';
const FLOAT_AMP     = 14;
const FLOAT_SPEED   = 0.018;

let floatPhase  = 0;
let cfPhase     = Math.PI;
let mascotReady = false;
let cfReady     = false;
let isDragging  = false;
let dragStartY  = 0;
let dragDeltaY  = 0;
let triggered   = false;
let mainRafId   = null;


// ════════════════════════════════════════════════════════════
// MAIN LOOP
// ════════════════════════════════════════════════════════════
function mainLoop() {
  drawBg();
  floatPhase += FLOAT_SPEED;
  cfPhase    += FLOAT_SPEED * 0.85;

  if (!isDragging && !triggered && mascotReady) {
    const fy = Math.sin(floatPhase) * FLOAT_AMP;
    mascotWrap.style.transform = `translateX(${MASCOT_BASE_X}) translateY(${fy}px)`;
  }
  if (!isDragging && !triggered && cfReady) {
    const cy = Math.sin(cfPhase) * 10;
    classText.style.transform = `translateX(-50%) translateY(${cy}px)`;
  }
  mainRafId = requestAnimationFrame(mainLoop);
}


// ════════════════════════════════════════════════════════════
// REVEAL — dipanggil tepat setelah semua aset selesai load
// ════════════════════════════════════════════════════════════
function reveal() {
  // 1. Pasang src dari cache ke elemen HTML (gambar sudah ada di memori)
  //    → tidak ada request jaringan baru, langsung render
  logoEl.src    = imageCache[SCENE_URLS[0]].src;
  classText.src = imageCache[SCENE_URLS[1]].src;
  mascotImg.src = imageCache[SCENE_URLS[2]].src;

  // 2. Bangun BG strip
  resizeBg();

  // 3. Mulai loop animasi
  requestAnimationFrame(mainLoop);

  // 4. Sembunyikan loading screen
  loadingScreen.classList.add('hide');
  setTimeout(() => { loadingScreen.style.display = 'none'; }, 950);

  // 5. Tampilkan scene
  scene.classList.add('show');

  // 6. Rise maskot setelah scene terlihat
  setTimeout(() => {
    mascotWrap.style.transition = 'transform 2.2s cubic-bezier(0.20,0.85,0.36,1)';
    mascotWrap.style.transform  = `translateX(${MASCOT_BASE_X}) translateY(0px)`;

    setTimeout(() => {
      mascotWrap.style.transition = '';
      mascotReady = true;

      // Tampilkan CTA
      cta.style.transition = 'opacity 0.7s ease';
      cta.style.opacity    = '0.65';
    }, 2300);
  }, 500);

  setTimeout(() => { cfReady = true; }, 1600);
}


// ════════════════════════════════════════════════════════════
// FULL RESET — saat kembali dari halaman lain (back button)
// ════════════════════════════════════════════════════════════
function fullReset() {
  // Reset state
  triggered   = false;
  isDragging  = false;
  dragDeltaY  = 0;
  dragStartY  = 0;
  mascotReady = false;
  cfReady     = false;
  floatPhase  = 0;
  cfPhase     = Math.PI;
  bgOffset    = 0;

  // Reset CSS elemen
  scene.classList.remove('exit');
  scene.style.animation = '';
  scene.classList.add('show');

  mascotWrap.style.transition = 'none';
  mascotWrap.style.transform  = `translateX(${MASCOT_BASE_X}) translateY(120%)`;
  mascotWrap.style.opacity    = '1';

  classText.style.transition = 'none';
  classText.style.opacity    = '1';
  classText.style.transform  = 'translateX(-50%)';

  cta.style.transition = 'none';
  cta.style.opacity    = '0';
  cta.style.transform  = 'translateX(-50%) translateY(0)';

  // Force reflow agar transition reset benar-benar diterapkan
  void mascotWrap.offsetWidth;

  // Rise ulang
  setTimeout(() => {
    mascotWrap.style.transition = 'transform 2.2s cubic-bezier(0.20,0.85,0.36,1)';
    mascotWrap.style.transform  = `translateX(${MASCOT_BASE_X}) translateY(0px)`;

    setTimeout(() => {
      mascotWrap.style.transition = '';
      mascotReady = true;
      cta.style.transition = 'opacity 0.7s ease';
      cta.style.opacity    = '0.65';
    }, 2300);
  }, 300);

  setTimeout(() => { cfReady = true; }, 1400);
}

window.addEventListener('pageshow', e => {
  if (e.persisted) fullReset();
});


// ════════════════════════════════════════════════════════════
// DRAG / SWIPE
// ════════════════════════════════════════════════════════════
const MAX_DRAG = 320;
const TRIGGER  = 130;

function onStart(y) {
  if (!mascotReady || triggered) return;
  isDragging = true;
  dragStartY = y;
  dragDeltaY = 0;
}

function onMove(y) {
  if (!isDragging || triggered) return;
  dragDeltaY = Math.max(0, Math.min(dragStartY - y, MAX_DRAG));

  const fy = Math.sin(floatPhase) * FLOAT_AMP;
  mascotWrap.style.transform = `translateX(${MASCOT_BASE_X}) translateY(${fy - dragDeltaY}px)`;

  const p1 = Math.min(dragDeltaY / (TRIGGER * 0.7), 1);
  cta.style.transform = `translateX(-50%) translateY(${-dragDeltaY * 0.8}px)`;
  cta.style.opacity   = String(0.65 * (1 - p1));

  // Class text fade out saat swipe
  const p2 = Math.min(dragDeltaY / (TRIGGER * 0.85), 1);
  classText.style.opacity   = String(1 - p2);
  classText.style.transform = `translateX(-50%) scale(${1 - p2 * 0.08})`;

  // Maskot TIDAK memudar — hanya naik, opacity tetap penuh
  mascotWrap.style.opacity = '1';

  if (dragDeltaY >= TRIGGER) goToForm();
}

function onEnd() {
  if (!isDragging) return;
  isDragging = false;
  if (triggered || dragDeltaY >= TRIGGER) { goToForm(); return; }

  // Snap kembali ke posisi semula
  cta.style.transition = 'transform .45s cubic-bezier(.34,1.3,.64,1), opacity .45s ease';
  cta.style.transform  = 'translateX(-50%) translateY(0)';
  cta.style.opacity    = '0.65';
  mascotWrap.style.opacity = '1';

  const sf = dragDeltaY, sd = 450, st = performance.now();
  (function snap(now) {
    const t  = Math.min((now - st) / sd, 1);
    const e  = 1 - Math.pow(1 - t, 3);
    const fy = Math.sin(floatPhase) * FLOAT_AMP;
    mascotWrap.style.transform = `translateX(${MASCOT_BASE_X}) translateY(${fy - sf*(1-e)}px)`;
    if (t < 1) requestAnimationFrame(snap);
  })(performance.now());

  const fo = parseFloat(classText.style.opacity) || 0;
  const fd = 400, ft = performance.now();
  (function fadeBack(now) {
    const t  = Math.min((now - ft) / fd, 1);
    const op = fo + (1 - fo) * (1 - Math.pow(1 - t, 2));
    classText.style.opacity   = String(op);
    classText.style.transform = `translateX(-50%) scale(${1 - (1 - op) * 0.08})`;
    if (t < 1) requestAnimationFrame(fadeBack);
  })(performance.now());

  dragDeltaY = 0;
}

document.addEventListener('touchstart',  e => onStart(e.touches[0].clientY),           {passive:true});
document.addEventListener('touchmove',   e => onMove(e.touches[0].clientY),             {passive:true});
document.addEventListener('touchend',    () => onEnd(),                                 {passive:true});
document.addEventListener('touchcancel', () => onEnd(),                                 {passive:true});
document.addEventListener('mousedown',   e => onStart(e.clientY));
document.addEventListener('mousemove',   e => { if (isDragging) onMove(e.clientY); });
document.addEventListener('mouseup',     () => onEnd());
cta.addEventListener('click', () => { if (!triggered && dragDeltaY < 10) goToForm(); });


// ════════════════════════════════════════════════════════════
// GO TO FORM
// ════════════════════════════════════════════════════════════
function goToForm() {
  if (triggered) return;
  triggered  = true;
  isDragging = false;

  const fy = Math.sin(floatPhase) * FLOAT_AMP;

  // Maskot terbang naik — TIDAK fade, opacity tetap 1
  mascotWrap.style.transition = 'transform 0.6s cubic-bezier(0.4,0,0.2,1)';
  mascotWrap.style.transform  = `translateX(${MASCOT_BASE_X}) translateY(${fy - 500}px)`;
  mascotWrap.style.opacity    = '1';

  // CTA naik & fade
  cta.style.transition = 'transform .4s ease, opacity .35s ease';
  cta.style.transform  = 'translateX(-50%) translateY(-120px)';
  cta.style.opacity    = '0';

  // Class of 2026 — fade out
  classText.style.transition = 'opacity .4s ease';
  classText.style.opacity    = '0';

  setTimeout(() => {
    scene.classList.add('exit');
    setTimeout(() => { window.location.href = 'index.html'; }, 460);
  }, 420);
}
