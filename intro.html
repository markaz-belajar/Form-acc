<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Markaz Belajar — Class of 2026</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;touch-action:none;background:#6ec6f5;}
  #scene{position:fixed;inset:0;overflow:hidden;}

  /* ====== BG — canvas, zero gap ====== */
  #bg-canvas{
    position:absolute;top:0;left:0;
    width:100%;height:100%;
    z-index:1;display:block;
  }
  #bg-strip{display:none;}

  /* ====== LOGO ====== */
  #logo{
    position:absolute;top:48px;left:50%;
    transform:translateX(-50%);width:136px;z-index:10;opacity:0;
    filter:drop-shadow(0 4px 16px rgba(0,0,0,0.20));
    animation:logoIn 0.7s cubic-bezier(0.34,1.4,0.64,1) 0.5s forwards;
  }
  @keyframes logoIn{
    0%  {opacity:0;transform:translateX(-50%) translateY(-24px) scale(0.75);}
    100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}
  }

  /* ====== CLASS OF 2026 ====== */
  #class-text{
    position:absolute;top:110px;left:50%;
    transform:translateX(-50%);width:86%;max-width:360px;
    z-index:9;opacity:0;
    filter:drop-shadow(0 6px 20px rgba(0,0,0,0.22));
    animation:textIn 1.0s cubic-bezier(0.22,1.4,0.36,1) 1.1s forwards;
  }
  @keyframes textIn{
    0%  {opacity:0;transform:translateX(-50%) scale(0.5) rotate(-5deg);}
    65% {opacity:1;transform:translateX(-50%) scale(1.07) rotate(1deg);}
    100%{opacity:1;transform:translateX(-50%) scale(1) rotate(0deg);}
  }

  /* ====== MASKOT — sedikit lebih kecil, lebih ke kanan ====== */
  #mascot-wrap{
    position:absolute;
    bottom:-2%;
    left:62%;
    width:68%;max-width:300px;
    z-index:8;
    will-change:transform;
  }
  #mascot-wrap img{
    width:100%;
    filter:drop-shadow(0 14px 30px rgba(0,0,0,0.15));
    opacity:0;
    transition:opacity 1.2s ease;
  }
  #mascot-wrap img.visible{ opacity:1; }

  /* gradient dihapus total */

  /* ====== SWIPE CTA ====== */
  #swipe-cta{
    position:absolute;bottom:38px;left:50%;
    transform:translateX(-50%);
    z-index:20;opacity:0;
    display:flex;flex-direction:column;align-items:center;gap:5px;
    animation:ctaIn 0.9s ease 2.6s forwards;
    cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
    will-change:transform;
  }
  @keyframes ctaIn{
    0%  {opacity:0;transform:translateX(-50%) translateY(20px);}
    100%{opacity:1;transform:translateX(-50%) translateY(0);}
  }
  .arrows{
    display:flex;flex-direction:column;align-items:center;gap:1px;
  }
  .arr{display:block;width:38px;height:19px;overflow:visible;}
  .arr svg{overflow:visible;}
  .arr svg polyline{stroke:white;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .arr:nth-child(1){opacity:0.28;}
  .arr:nth-child(2){opacity:0.60;}
  .arr:nth-child(3){opacity:1.00;}
  /* Glow pada SVG element (bukan polyline) — tidak bikin kotak */
  .arr:nth-child(3) svg{
    filter:drop-shadow(0 0 5px rgba(255,255,255,0.9)) drop-shadow(0 0 10px rgba(130,230,255,0.7));
  }
  .swipe-label{
    font-size:15px;font-weight:800;letter-spacing:2.5px;
    text-transform:uppercase;color:#fff;margin-top:3px;
    text-shadow:0 0 12px rgba(255,255,255,0.9),0 0 28px rgba(100,210,255,0.7),0 2px 6px rgba(0,0,0,0.25);
    animation:labelPulse 2.2s ease-in-out 3.0s infinite;
  }
  @keyframes labelPulse{
    0%,100%{opacity:0.85;}
    50%    {opacity:1;text-shadow:0 0 20px rgba(255,255,255,1),0 0 48px rgba(100,210,255,1),0 2px 6px rgba(0,0,0,0.25);}
  }

  /* ====== SPARKLES ====== */
  .sp{position:absolute;pointer-events:none;z-index:15;opacity:0;animation:spk 2.8s ease-in-out infinite;}
  @keyframes spk{
    0%,100%{opacity:0;transform:scale(0.4) rotate(0deg);}
    50%    {opacity:0.8;transform:scale(1) rotate(180deg);}
  }

  /* ====== EXIT ====== */
  #scene.exit{animation:exitAnim 0.45s cubic-bezier(0.4,0,0.6,1) forwards;}
  @keyframes exitAnim{
    0%  {opacity:1;transform:scale(1);}
    100%{opacity:0;transform:scale(1.06);}
  }
</style>
</head>
<body>
<div id="scene">

  <!-- BG: 4 frame side by side -->
  <div id="bg-strip">
    <img src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/beg_1.1.png" alt="">
    <img src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/beg_1.2.png" alt="">
    <img src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/beg_1.3.png" alt="">
    <img src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/beg_1.4.png" alt="">
  </div>

  <!-- Sparkles -->
  <div class="sp" style="top:17%;left:7%;animation-delay:0.4s;"><svg width="17" height="17" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12l6.5-1.5z" fill="white"/></svg></div>
  <div class="sp" style="top:11%;right:13%;animation-delay:1.3s;"><svg width="11" height="11" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12l6.5-1.5z" fill="white"/></svg></div>
  <div class="sp" style="top:32%;left:14%;animation-delay:2.0s;"><svg width="9" height="9" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12l6.5-1.5z" fill="white" opacity="0.7"/></svg></div>
  <div class="sp" style="top:22%;right:25%;animation-delay:0.9s;"><svg width="13" height="13" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12l6.5-1.5z" fill="rgba(255,240,140,0.95)"/></svg></div>

  <!-- Logo -->
  <img id="logo" src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/MARKAZ_BELAJAR_LOGO.png" alt="Markaz Belajar">

  <!-- Class of 2026 -->
  <img id="class-text" src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/bag_2.png" alt="Class of 2026">

  <!-- Maskot -->
  <div id="mascot-wrap">
    <img id="mascot-img" src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/bag_3.png" alt="Maskot Soma">
  </div>

  <!-- Gradient bawah -->
  <div id="pull-gradient"></div>

  <!-- Swipe CTA -->
  <div id="swipe-cta">
    <div class="arrows">
      <div class="arr"><svg viewBox="0 0 38 19"><polyline points="4,15 19,4 34,15"/></svg></div>
      <div class="arr"><svg viewBox="0 0 38 19"><polyline points="4,15 19,4 34,15"/></svg></div>
      <div class="arr"><svg viewBox="0 0 38 19"><polyline points="4,15 19,4 34,15"/></svg></div>
    </div>
    <div class="swipe-label">Swipe up !</div>
  </div>

</div>
<script>
// ============================================================
// Fix #1: BG SLIDE — HANYA pakai JS, CSS animation dihapus.
// Sistem: strip lebar 4×VW. Kita scroll ke kiri (bgX negatif).
// Saat bgX mencapai -(VW * 3), ada duplicate frame 1 di posisi 4
// tapi karena loop mulus kita reset ke -VW*0 langsung tidak terasa.
//
// Teknik seamless: kita clone frame pertama dan tempel di akhir (total 5 frame = 500%),
// sehingga saat frame ke-4 habis, frame ke-5 (= clone frame-1) tampil mulus,
// lalu kita reset posisi ke 0 tanpa visual glitch.
// ============================================================
const strip = document.getElementById('bg-strip');

// Clone frame pertama dan append ke strip untuk seamless loop
const firstImg = strip.children[0];
const cloneImg = firstImg.cloneNode(true);
strip.appendChild(cloneImg);
// Sekarang strip punya 5 gambar → lebar 500%
strip.style.width = '500%';

const VW = window.innerWidth;
let bgX = 0;
const BG_SPEED = 0.22; // px per frame → gerak ke kiri

function tickBg() {
  bgX -= BG_SPEED; // geser ke kiri
  // Saat sudah geser 4 frame penuh (= 4 × VW), reset ke 0 (seamless karena frame ke-5 = frame ke-1)
  if (bgX <= -(VW * 4)) bgX = 0;
  strip.style.transform = `translateX(${bgX}px)`;
  requestAnimationFrame(tickBg);
}
requestAnimationFrame(tickBg);

// ============================================================
// Fix #4: Android back button — reset scene saat pageshow
// Ketika user back dari halaman berikutnya, browser bisa restore
// page dari bfcache dalam kondisi "exit". Reset semua state di sini.
// ============================================================
window.addEventListener('pageshow', function(e) {
  // e.persisted = true berarti dari bfcache (Android back button)
  if (e.persisted) {
    const scene = document.getElementById('scene');
    // Hapus class exit dan reset opacity/transform
    scene.classList.remove('exit');
    scene.style.animation = 'none';
    scene.style.opacity   = '1';
    scene.style.transform = 'scale(1)';
    // Reset state drag
    isDragging = false;
    dragDeltaY = 0;
    // Reset elemen yang mungkin bergeser
    cta.style.transition      = 'none';
    cta.style.transform       = 'translateX(-50%) translateY(0)';
    gradient.style.transition = 'none';
    gradient.style.opacity    = '1';
    classText.style.opacity   = '1';
    classText.style.transform = 'translateX(-50%) scale(1) rotate(0deg)';
  }
});

// ============================================================
// STATE
// ============================================================
const mascotWrap  = document.getElementById('mascot-wrap');
const mascotImg   = document.getElementById('mascot-img');
const classText   = document.getElementById('class-text');
const cta         = document.getElementById('swipe-cta');
const gradient    = document.getElementById('pull-gradient');

let mascotReady   = false;
let isDragging    = false;
let dragStartY    = 0;
let dragDeltaY    = 0;

// Levitasi (float)
let floatPhase    = 0;
let floatActive   = true;
const FLOAT_AMP   = 14;
const FLOAT_SPEED = 0.018;

let rafId = null;

// ============================================================
// RISE MASKOT
// ============================================================
mascotWrap.style.transform = 'translateX(-50%) translateY(115%)';

setTimeout(() => {
  mascotImg.classList.add('visible');
  mascotWrap.style.transition = 'transform 2.6s cubic-bezier(0.20,0.85,0.36,1)';
  mascotWrap.style.transform  = 'translateX(-50%) translateY(0px)';

  setTimeout(() => {
    mascotWrap.style.transition = 'none';
    mascotReady = true;
    startMainLoop();
  }, 2700);
}, 800);

let classTextReady = false;
let classFloatPhase = Math.PI;
setTimeout(() => { classTextReady = true; }, 2200);

// ============================================================
// MAIN LOOP
// ============================================================
function startMainLoop() {
  if (rafId) return;
  function loop() {
    floatPhase      += FLOAT_SPEED;
    classFloatPhase += FLOAT_SPEED * 0.85;

    const floatY = Math.sin(floatPhase) * FLOAT_AMP;

    if (!isDragging) {
      mascotWrap.style.transform = `translateX(-50%) translateY(${floatY}px)`;
    }

    if (classTextReady && !isDragging) {
      const ctY = Math.sin(classFloatPhase) * 10;
      classText.style.transform = `translateX(-50%) translateY(${ctY}px) scale(1) rotate(0deg)`;
    }

    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);
}

// ============================================================
// DRAG INTERACTION
// ============================================================
const MAX_DRAG = 260;
const TRIGGER  = 140;

function onStart(y) {
  if (!mascotReady) return;
  isDragging  = true;
  dragStartY  = y;
  dragDeltaY  = 0;
}

function onMove(y) {
  if (!isDragging) return;

  const raw = dragStartY - y;
  dragDeltaY = Math.max(0, Math.min(raw, MAX_DRAG));

  const floatY = Math.sin(floatPhase) * FLOAT_AMP;
  mascotWrap.style.transform = `translateX(-50%) translateY(${floatY - dragDeltaY}px)`;

  cta.style.transform = `translateX(-50%) translateY(${-dragDeltaY}px)`;

  // Gradient DIAM — hanya opacity yang berubah, tidak bergerak
  const p = dragDeltaY / MAX_DRAG;
  gradient.style.opacity = String(0.55 + p * 0.45);

  const progress = Math.min(dragDeltaY / (TRIGGER * 0.85), 1);
  const opacity  = 1 - progress;
  const scale    = 1 - progress * 0.08;
  classText.style.transition = 'none';
  classText.style.opacity    = String(opacity);
  classText.style.transform  = `translateX(-50%) scale(${scale}) rotate(0deg)`;

  if (dragDeltaY >= TRIGGER) goToForm();
}

function onEnd(_y) {
  if (!isDragging) return;
  isDragging = false;

  if (dragDeltaY >= TRIGGER) { goToForm(); return; }

  cta.style.transition      = 'transform 0.45s cubic-bezier(0.34,1.3,0.64,1)';
  gradient.style.transition = 'opacity 0.45s ease';
  cta.style.transform       = 'translateX(-50%) translateY(0)';
  gradient.style.opacity    = '1';

  const snapFrom = dragDeltaY;
  const snapDur  = 450;
  const snapT0   = performance.now();

  function snapMascot(now) {
    const t    = Math.min((now - snapT0) / snapDur, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    const remaining = snapFrom * (1 - ease);
    const floatY = Math.sin(floatPhase) * FLOAT_AMP;
    mascotWrap.style.transform = `translateX(-50%) translateY(${floatY - remaining}px)`;
    if (t < 1) requestAnimationFrame(snapMascot);
  }
  requestAnimationFrame(snapMascot);

  const fromOpacity = parseFloat(classText.style.opacity) || 0;
  const fadeDur     = 400;
  const fadeT0      = performance.now();

  function fadeClassBack(now) {
    const t    = Math.min((now - fadeT0) / fadeDur, 1);
    const ease = 1 - Math.pow(1 - t, 2);
    const op   = fromOpacity + (1 - fromOpacity) * ease;
    const sc   = 1 - (1 - op) * 0.08;
    classText.style.opacity   = String(op);
    classText.style.transform = `translateX(-50%) scale(${sc}) rotate(0deg)`;
    if (t < 1) requestAnimationFrame(fadeClassBack);
  }
  requestAnimationFrame(fadeClassBack);

  dragDeltaY = 0;
}

// Touch events
document.addEventListener('touchstart', e => onStart(e.touches[0].clientY),            {passive:true});
document.addEventListener('touchmove',  e => onMove(e.touches[0].clientY),             {passive:true});
document.addEventListener('touchend',   e => onEnd(e.changedTouches[0].clientY),       {passive:true});
document.addEventListener('touchcancel',e => onEnd(e.changedTouches[0]?.clientY || 0), {passive:true});

// Mouse (desktop testing)
document.addEventListener('mousedown',  e => onStart(e.clientY));
document.addEventListener('mousemove',  e => { if (isDragging) onMove(e.clientY); });
document.addEventListener('mouseup',    e => onEnd(e.clientY));

// Click CTA
cta.addEventListener('click', () => { if (dragDeltaY < 10) goToForm(); });

function goToForm() {
  isDragging = false;
  const scene = document.getElementById('scene');
  scene.classList.add('exit');
  setTimeout(() => { window.location.href = 'index.html'; }, 460);
}
</script>
</body>
</html>
