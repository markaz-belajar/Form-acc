<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Markaz Belajar — Class of 2026</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

  :root{
    --sky1:#6ec6f5;
    --sky2:#b8e4ff;
    --sky3:#dff3ff;
  }

  html,body{
    width:100%;height:100%;
    overflow:hidden;
    touch-action:pan-y;
    font-family:'Segoe UI',sans-serif;
  }

  /* ===== SCENE ===== */
  #scene{
    position:fixed;
    inset:0;
    background:linear-gradient(180deg, #5bbde8 0%, #9dd9f7 40%, #c8ecff 75%, #e8f7ff 100%);
    overflow:hidden;
  }

  /* ===== LAYER 1: PARALLAX CLOUDS BG ===== */
  #clouds-layer{
    position:absolute;
    inset:0;
    width:200%;          /* double wide untuk scroll */
    height:100%;
    z-index:1;
    animation: cloudDrift 18s linear infinite;
    will-change: transform;
  }
  #clouds-layer img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
  }
  @keyframes cloudDrift{
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ===== LAYER 2: LOGO ===== */
  #logo{
    position:absolute;
    top:52px;
    left:50%;
    transform:translateX(-50%);
    width:140px;
    z-index:10;
    opacity:0;
    filter:drop-shadow(0 4px 16px rgba(0,0,0,0.18));
    animation: logoIn 0.7s cubic-bezier(0.34,1.4,0.64,1) 0.4s forwards;
  }
  @keyframes logoIn{
    0%  { opacity:0; transform:translateX(-50%) scale(0.7) translateY(-20px); }
    100%{ opacity:1; transform:translateX(-50%) scale(1) translateY(0); }
  }

  /* ===== LAYER 3: CLASS OF 2026 TEXT ===== */
  #class-text{
    position:absolute;
    top:130px;
    left:50%;
    transform:translateX(-50%);
    width:78%;
    max-width:300px;
    z-index:9;
    opacity:0;
    filter:drop-shadow(0 6px 20px rgba(0,0,0,0.25));
    animation:
      textIn 0.9s cubic-bezier(0.22,1.4,0.36,1) 1.0s forwards,
      textFloat 4s ease-in-out 2.2s infinite;
  }
  @keyframes textIn{
    0%  { opacity:0; transform:translateX(-50%) scale(0.5) rotate(-4deg); }
    60% { opacity:1; transform:translateX(-50%) scale(1.06) rotate(1deg); }
    100%{ opacity:1; transform:translateX(-50%) scale(1) rotate(0deg); }
  }
  @keyframes textFloat{
    0%,100%{ transform:translateX(-50%) translateY(0px) rotate(0deg); }
    50%    { transform:translateX(-50%) translateY(-10px) rotate(0.5deg); }
  }

  /* ===== LAYER 4: MASKOT SOMA — flies in from bottom ===== */
  #mascot{
    position:absolute;
    bottom:-20px;
    right:-10px;
    width:62%;
    max-width:270px;
    z-index:8;
    opacity:0;
    filter:drop-shadow(0 12px 28px rgba(0,0,0,0.18));
    animation:
      mascotFlyIn 1.1s cubic-bezier(0.22,1.3,0.36,1) 0.6s forwards,
      mascotFloat 3.6s ease-in-out 2.0s infinite;
    transform-origin: center bottom;
  }
  @keyframes mascotFlyIn{
    0%  { opacity:0; transform:translateY(120%) scale(0.8) rotate(6deg); }
    60% { opacity:1; transform:translateY(-18px) scale(1.04) rotate(-2deg); }
    80% { transform:translateY(6px) scale(0.98) rotate(0.5deg); }
    100%{ opacity:1; transform:translateY(0px) scale(1) rotate(0deg); }
  }
  @keyframes mascotFloat{
    0%,100%{ transform:translateY(0px) rotate(0deg); }
    40%    { transform:translateY(-14px) rotate(-1deg); }
  }

  /* ===== SWIPE UP CTA ===== */
  #swipe-cta{
    position:absolute;
    bottom:52px;
    left:50%;
    transform:translateX(-50%);
    z-index:20;
    opacity:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    animation: ctaIn 0.8s ease 2.2s forwards;
    cursor:pointer;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  @keyframes ctaIn{
    0%  { opacity:0; transform:translateX(-50%) translateY(24px); }
    100%{ opacity:1; transform:translateX(-50%) translateY(0); }
  }

  /* Arrow group — 3 chevrons bouncing */
  .arrows{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
    animation: arrowBounce 1.4s ease-in-out 2.8s infinite;
  }
  @keyframes arrowBounce{
    0%,100%{ transform:translateY(0); }
    50%    { transform:translateY(-8px); }
  }
  .arrow-chevron{
    width:32px;
    height:16px;
    opacity:0;
    animation: chevronFade 1.4s ease-in-out infinite;
  }
  .arrow-chevron:nth-child(1){ animation-delay:2.8s; }
  .arrow-chevron:nth-child(2){ animation-delay:3.0s; }
  .arrow-chevron:nth-child(3){ animation-delay:3.2s; }
  @keyframes chevronFade{
    0%,100%{ opacity:0.2; }
    50%    { opacity:1; }
  }
  .arrow-chevron svg polyline{
    stroke:white;
    stroke-width:3;
    fill:none;
    stroke-linecap:round;
    stroke-linejoin:round;
    filter:drop-shadow(0 0 6px rgba(255,255,255,0.9));
  }

  /* Text "Swipe up" */
  .swipe-label{
    font-size:15px;
    font-weight:800;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:#ffffff;
    text-shadow:
      0 0 12px rgba(255,255,255,0.9),
      0 0 28px rgba(100,210,255,0.7),
      0 2px 6px rgba(0,0,0,0.25);
    animation: labelPulse 2s ease-in-out 2.8s infinite;
  }
  @keyframes labelPulse{
    0%,100%{ text-shadow: 0 0 12px rgba(255,255,255,0.9), 0 0 28px rgba(100,210,255,0.7), 0 2px 6px rgba(0,0,0,0.25); }
    50%    { text-shadow: 0 0 22px rgba(255,255,255,1),   0 0 50px rgba(100,210,255,1),   0 2px 6px rgba(0,0,0,0.25); }
  }

  /* Glow ring around swipe area */
  .swipe-glow{
    position:absolute;
    bottom:36px;
    left:50%;
    transform:translateX(-50%);
    width:180px;
    height:60px;
    border-radius:99px;
    border:1.5px solid rgba(255,255,255,0.4);
    box-shadow:
      0 0 18px rgba(100,220,255,0.35),
      inset 0 0 18px rgba(255,255,255,0.08);
    animation: glowPulse 2s ease-in-out 2.8s infinite;
    pointer-events:none;
    z-index:19;
    opacity:0;
    animation: ctaIn 0.8s ease 2.4s forwards, glowPulse 2s ease-in-out 3.2s infinite;
  }
  @keyframes glowPulse{
    0%,100%{ box-shadow:0 0 18px rgba(100,220,255,0.35), inset 0 0 18px rgba(255,255,255,0.08); }
    50%    { box-shadow:0 0 38px rgba(100,220,255,0.65), inset 0 0 28px rgba(255,255,255,0.14); }
  }

  /* ===== TRANSITION OUT ===== */
  #scene.exit{
    animation: sceneExit 0.55s cubic-bezier(0.4,0,0.6,1) forwards;
  }
  @keyframes sceneExit{
    0%  { opacity:1; transform:scale(1); }
    100%{ opacity:0; transform:scale(1.06); }
  }

  /* Sparkle particles */
  .sparkle{
    position:absolute;
    pointer-events:none;
    z-index:15;
    opacity:0;
    animation: sparklePop 2.5s ease-in-out infinite;
  }
  @keyframes sparklePop{
    0%,100%{ opacity:0; transform:scale(0.5) rotate(0deg); }
    50%    { opacity:0.85; transform:scale(1) rotate(180deg); }
  }
</style>
</head>
<body>

<div id="scene">

  <!-- Layer 1: Clouds parallax (double-wide background) -->
  <div id="clouds-layer">
    <img src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/bag_1.png" alt="">
    <!-- Mirror copy untuk seamless loop -->
    <img src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/bag_1.png" alt="" style="position:absolute;left:50%;top:0;width:50%;height:100%;object-fit:cover;">
  </div>

  <!-- Sparkle stars -->
  <div class="sparkle" style="top:18%;left:8%;animation-delay:0.5s;">
    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12l6.5-1.5z" fill="white" opacity="0.9"/></svg>
  </div>
  <div class="sparkle" style="top:12%;right:14%;animation-delay:1.2s;">
    <svg width="13" height="13" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12l6.5-1.5z" fill="white" opacity="0.85"/></svg>
  </div>
  <div class="sparkle" style="top:28%;left:18%;animation-delay:2.1s;">
    <svg width="10" height="10" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12l6.5-1.5z" fill="white" opacity="0.7"/></svg>
  </div>
  <div class="sparkle" style="top:22%;right:28%;animation-delay:0.8s;">
    <svg width="14" height="14" viewBox="0 0 24 24"><path d="M12 2l1.5 6.5L20 12l-6.5 1.5L12 22l-1.5-6.5L4 12l6.5-1.5z" fill="rgba(255,240,150,0.9)"/></svg>
  </div>

  <!-- Layer 4: Logo (top center) -->
  <img id="logo"
    src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/MARKAZ_BELAJAR_LOGO.png"
    alt="Markaz Belajar">

  <!-- Layer 3: Class of 2026 text (center) -->
  <img id="class-text"
    src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/bag_2.png"
    alt="Class of 2026 Preschool & Elementary">

  <!-- Layer 2: Maskot Soma (flies up from bottom right) -->
  <img id="mascot"
    src="https://raw.githubusercontent.com/markaz-belajar/Form-acc/main/bag_3.png"
    alt="Maskot Soma">

  <!-- Glow ring -->
  <div class="swipe-glow"></div>

  <!-- Swipe Up CTA -->
  <div id="swipe-cta" onclick="goToForm()">
    <div class="arrows">
      <div class="arrow-chevron">
        <svg viewBox="0 0 32 16"><polyline points="4,12 16,4 28,12"/></svg>
      </div>
      <div class="arrow-chevron">
        <svg viewBox="0 0 32 16"><polyline points="4,12 16,4 28,12"/></svg>
      </div>
      <div class="arrow-chevron">
        <svg viewBox="0 0 32 16"><polyline points="4,12 16,4 28,12"/></svg>
      </div>
    </div>
    <div class="swipe-label">Swipe up !</div>
  </div>

</div>

<script>
  function goToForm() {
    document.getElementById('scene').classList.add('exit');
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 500);
  }

  // Touch swipe up detection
  let touchStartY = 0;
  document.addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    const dy = touchStartY - e.changedTouches[0].clientY;
    if (dy > 60) goToForm(); // swipe up 60px
  }, { passive: true });

  // Seamless cloud loop — fix image tiling
  const layer = document.getElementById('clouds-layer');
  const imgs = layer.querySelectorAll('img');
  imgs[0].style.cssText = 'position:absolute;left:0;top:0;width:50%;height:100%;object-fit:cover;';
  imgs[1].style.cssText = 'position:absolute;left:50%;top:0;width:50%;height:100%;object-fit:cover;';
</script>

</body>
</html>
